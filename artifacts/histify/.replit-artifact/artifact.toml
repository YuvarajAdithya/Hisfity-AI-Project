kind = "web"
previewPath = "/"
title = "Histify"
version = "1.0.0"
id = "artifacts/histify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21686
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/histify run dev"

[services.env]
PORT = "21686"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/histify", "run", "build"]
publicDir = "artifacts/histify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
